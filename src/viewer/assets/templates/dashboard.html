<!DOCTYPE html>

<head>
    <title>Rezolus Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.32/dist/uPlot.iife.min.js"></script>

<body>
    <div class="container full-width">
        <h1>Rezolus Time Series Dashboard</h1>
        
        <div class="instructions">
            <p>Click and drag on any chart to zoom all charts. Double-click to reset zoom.</p>
        </div>

        <button id="reset-zoom">Reset Zoom</button>
        <button id="toggle-all-groups">Expand/Collapse All Groups</button>

        <div id="dashboard-groups">
            <!-- Groups will be generated by JavaScript -->
        </div>
    </div>

    <style>
        /* Hide 'Time' and 'Dummy' labels from legend */
        .u-legend [data-idx="0"],
        .u-legend [data-idx="1"] {
            display: none !important;
        }
        
        /* Hide chart type badges */
        .chart-type-badge {
            display: none;
        }
        
        /* Position heatmap legend */
        .heatmap-legend-container {
            position: absolute;
            bottom: 25px;
            left: 10px;
            z-index: 5;
        }
        
        /* Add space for CPU labels */
        .cpu-heatmap .u-over {
            padding-left: 40px;
        }
    </style>

    <style>
        /* Hide Time and Dummy labels in the legend */
        .u-legend [data-idx="0"],
        .u-legend [data-idx="1"] {
            display: none !important;
        }
        
        /* Position heatmap legend properly */
        .heatmap-legend-container {
            position: absolute;
            bottom: 30px !important;
            left: 10px !important;
            z-index: 100;
            background-color: rgba(30, 30, 30, 0.8);
            border: 1px solid #333;
            border-radius: 4px;
            padding: 5px;
        }
        
        /* Add space for CPU labels and ensure they're visible */
        .cpu-heatmap {
            padding-left: 60px !important;
        }
        
        /* Remove any overlapping elements at the bottom of the heatmap */
        .cpu-heatmap .u-legend {
            display: none !important;
        }
        
        /* Fix tooltip visibility */
        .heatmap-tooltip {
            z-index: 1000 !important;
        }
    </style>

    <style>
        /* Fix chart spacing and alignment */
        .plot-container {
            margin-bottom: 15px !important;
        }
        
        /* Ensure consistent spacing in the grid layout */
        .group-content {
            display: grid;
            grid-gap: 15px !important;
        }
        
        /* Ensure heatmap is properly sized */
        .plot-container.full-width {
            width: 100% !important;
            margin-bottom: 15px !important;
        }
        
        /* Better match Y-axis labels */
        .cpu-heatmap text {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
            font-size: 11px !important;
            fill: #888888 !important;
        }
        
        /* Position legend to avoid time labels */
        .heatmap-legend-container {
            position: absolute !important;
            bottom: 45px !important;
            left: 70px !important;
            z-index: 100 !important;
        }
        
        /* Hide Time and Dummy labels */
        .u-legend [data-idx="0"],
        .u-legend [data-idx="1"] {
            display: none !important;
        }
    </style>

    <style>
        /* Make CPU charts display side-by-side when there's enough screen space */
        #group-1 .group-content {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        /* Set width for each CPU chart to allow side-by-side layout */
        #group-1 .plot-container {
            flex: 1 1 calc(50% - 20px);
            min-width: 400px;
            max-width: calc(50% - 10px);
        }
        
        /* Ensure the heatmap isn't forced to take full width */
        #group-1 .plot-container.full-width {
            flex: 1 1 calc(50% - 20px);
            min-width: 400px;
            max-width: calc(50% - 10px);
            width: calc(50% - 10px) !important;
        }
        
        /* For smaller screens, allow vertical stacking */
        @media (max-width: 992px) {
            #group-1 .plot-container,
            #group-1 .plot-container.full-width {
                flex: 1 1 100%;
                max-width: 100%;
                width: 100% !important;
            }
        }
    </style>

    <script src="/static/heatmap.js"></script>
    
    <!-- Dashboard initialization with embedded Jinja2 -->
    <script>
        // Dashboard Initialization Script
        document.addEventListener('DOMContentLoaded', () => {
            debug('🚀 Initializing dashboard');
            
            // Create zoom controller and make it globally available immediately
            window.zoomController = new ZoomController();
            
            // Get the groups container
            const groupsContainer = document.getElementById('dashboard-groups');
            
            // Group data from server
            const groupData = [];
            
            {% for group in metric_groups %}
            groupData.push({
                name: "{{ group.name }}",
                description: "{{ group.description }}",
                index: {{ loop.index0 }},
                series: [
                    {% for series in group.series %}
                    {
                        chart_type: "{{ series.chart_type }}",
                        title: "{{ series.title | safe }}",
                        timestamps: {{ series.timestamps | json_encode | safe }},
                        yUnits: "{{ series.y_units | safe }}",
                        series: [
                            {% for s in series.series %}
                            {
                                name: "{{ s.name | safe }}",
                                values: {{ s.values | json_encode | safe }},
                                color: "{{ s.color | safe }}"
                                {% if s.id %},
                                id: "{{ s.id }}"
                                {% endif %}
                            }{% if not loop.last %},{% endif %}
                            {% endfor %}
                        ]
                    }{% if not loop.last %},{% endif %}
                    {% endfor %}
                ]
            });
            {% endfor %}
            
            // Create all group HTML elements
            createDashboardGroups(groupData);
            
            // Setup group toggle functionality
            setupGroupToggles();
            
            // Create all plots
            createAllPlots(groupData, window.zoomController);
            
            // Set the initial range flag after all plots are created
            window.zoomController.setInitialized();
            
            // Reset zoom button
            document.getElementById('reset-zoom').addEventListener('click', () => {
                debug(`👆 Reset button clicked`);
                window.zoomController.resetZoom();
            });
            
            // Make plots responsive with optimized resize handler
            setupResizeHandlers();
            
            debug('✅ Dashboard initialization complete');
        });
        
        // Function to create dashboard groups
        function createDashboardGroups(groupData) {
            const groupsContainer = document.getElementById('dashboard-groups');
            
            groupData.forEach((group, groupIdx) => {
                const groupElement = document.createElement('div');
                groupElement.className = 'metric-group';
                groupElement.id = `group-${groupIdx + 1}`;
                groupElement.setAttribute('data-group-name', group.name);
                
                // Create group header
                const headerElement = document.createElement('div');
                headerElement.className = 'group-header';
                
                const headerInfoElement = document.createElement('div');
                
                const nameElement = document.createElement('h2');
                nameElement.className = 'group-name';
                nameElement.textContent = group.name;
                
                const descElement = document.createElement('p');
                descElement.className = 'group-description';
                descElement.textContent = group.description;
                
                headerInfoElement.appendChild(nameElement);
                headerInfoElement.appendChild(descElement);
                
                const toggleButton = document.createElement('button');
                toggleButton.className = 'group-toggle';
                toggleButton.setAttribute('data-group', groupIdx + 1);
                
                headerElement.appendChild(headerInfoElement);
                headerElement.appendChild(toggleButton);
                
                // Create group content
                const contentElement = document.createElement('div');
                contentElement.className = 'group-content';
                
                // Add plots to group
                group.series.forEach((series, seriesIdx) => {
                    const plotContainer = document.createElement('div');
                    
                    // Special handling for the CPU group (groupIdx === 0)
                    // Don't make heatmaps full-width in the CPU group
                    if (series.chart_type === 'heatmap' && groupIdx !== 0) {
                        plotContainer.className = 'plot-container full-width';
                    } else {
                        plotContainer.className = 'plot-container';
                    }
                    
                    const plotElement = document.createElement('div');
                    plotElement.id = `plot-${groupIdx}-${seriesIdx}`;
                    
                    plotContainer.appendChild(plotElement);
                    contentElement.appendChild(plotContainer);
                });
                
                // Assemble group
                groupElement.appendChild(headerElement);
                groupElement.appendChild(contentElement);
                
                // Add to page
                groupsContainer.appendChild(groupElement);
            });
        }
        
        // Function to create all plots
        function createAllPlots(groupData, zoomController) {
            groupData.forEach((group, groupIdx) => {
                debug(`📊 Creating plots for group: ${group.name}`);
                
                group.series.forEach((seriesData, seriesIdx) => {
                    const plotId = `plot-${groupIdx}-${seriesIdx}`;
                    const plotElement = document.getElementById(plotId);
                    
                    if (!plotElement) {
                        debug(`❌ Cannot find element with ID: ${plotId}`);
                        return;
                    }
                    
                    const container = plotElement.parentElement;
                    const containerWidth = container.clientWidth;
                    
                    debug(`📊 Plot ${plotId} data range: ${seriesData.timestamps[0].toFixed(2)} to ${seriesData.timestamps[seriesData.timestamps.length - 1].toFixed(2)}`);
                    debug(`📅 Plot ${plotId} time range: ${formatTimeOnly(seriesData.timestamps[0])} to ${formatTimeOnly(seriesData.timestamps[seriesData.timestamps.length - 1])}`);
                    debug(`🔤 Plot ${plotId} title: "${seriesData.title}", units: "${seriesData.yUnits}"`);
                    debug(`🔧 Plot ${plotId} chart type: "${seriesData.chart_type}"`);
                    debug(`📐 Plot ${plotId} container width: ${containerWidth}px`);
                    
                    try {
                        let plot;
                        
                        // Create the appropriate chart type
                        if (seriesData.chart_type === 'heatmap') {
                            // Create a heatmap chart 
                            const heatmapData = prepareHeatmapData(seriesData);
                            plot = createCpuHeatmap(plotId, heatmapData, {
                                title: seriesData.title,
                                width: containerWidth,
                                height: 400,
                                colorScale: [
                                    "#100060", "#4000A0", "#8000C0", "#A000E0", 
                                    "#C000FF", "#FF2000", "#FF6000", "#FFA000", "#FFE000"
                                ],
                                minValue: 0,
                                maxValue: 100,
                                units: seriesData.yUnits
                            });
                        } else {
                            // For line and scatter charts
                            plot = createLineOrScatterChart(
                                plotId, 
                                seriesData, 
                                containerWidth,
                                group.name
                            );
                        }
                        
                        // Register plot with zoom controller
                        plot._id = plotId;
                        plot._group = groupIdx;
                        plot._chart_type = seriesData.chart_type;
                        zoomController.registerPlot(plot);
                        
                        debug(`✅ Plot ${plotId} created successfully`);
                    } catch (err) {
                        debug(`❌ Error creating plot ${plotId}: ${err.message}`);
                        console.error(err);
                    }
                });
            });
        }

        function checkHeatmapAlignment() {
            const heatmaps = document.querySelectorAll('.cpu-heatmap');
            heatmaps.forEach((heatmap, idx) => {
                const canvas = heatmap.querySelector('.cpu-heatmap-canvas');
                const over = heatmap.querySelector('.u-over');
                
                if (canvas && over) {
                    console.log(`Heatmap #${idx} canvas:`, {
                        width: canvas.width,
                        height: canvas.height,
                        offsetLeft: canvas.offsetLeft,
                        offsetTop: canvas.offsetTop
                    });
                    
                    console.log(`Heatmap #${idx} interaction area:`, {
                        width: over.offsetWidth,
                        height: over.offsetHeight,
                        offsetLeft: over.offsetLeft,
                        offsetTop: over.offsetTop
                    });
                    
                    // Check for misalignment
                    if (Math.abs(canvas.width - over.offsetWidth) > 5 || 
                        Math.abs(canvas.height - over.offsetHeight) > 5 ||
                        Math.abs(canvas.offsetLeft - over.offsetLeft) > 5 ||
                        Math.abs(canvas.offsetTop - over.offsetTop) > 5) {
                        console.warn(`⚠️ Heatmap #${idx} has alignment issues!`);
                    }
                }
            });
        }
        
        // Function to set up improved resize handlers - updated to use window.zoomController
        function setupResizeHandlers() {
            // Debounced resize handler for smoother resizing
            let resizeTimeout;
            let isResizing = false;
            
            window.addEventListener('resize', () => {
                if (resizeTimeout) {
                    clearTimeout(resizeTimeout);
                }
                
                // Set a flag to indicate we're in a resize operation
                isResizing = true;
                
                // Immediately adjust plot sizes, using the global reference
                if (window.zoomController) {
                    window.zoomController.handleResize();
                }
                
                // After resize is complete, make sure everything is properly redrawn
                resizeTimeout = setTimeout(() => {
                    debug('📏 Resize complete, forcing redraw');
                    isResizing = false;
                    
                    // Force redraw of all plots, using the global reference
                    if (window.zoomController && window.zoomController.plots) {
                        window.zoomController.plots.forEach(plot => {
                            // Special handling for heatmaps
                            if (plot._chart_type === 'heatmap') {
                                // Find the canvas and redraw
                                const canvas = plot.root.querySelector('.cpu-heatmap-canvas');
                                if (canvas) {
                                    const ctx = canvas.getContext('2d');
                                    // Make sure the canvas is sized correctly
                                    canvas.width = plot.width;
                                    canvas.height = plot.height;
                                    // Trigger a redraw via the hooks
                                    plot.hooks.drawClear.forEach(fn => fn(plot));
                                }
                            }
                            
                            // Force a redraw for all plot types
                            plot.redraw();
                        });
                    }
                }, 250); // Wait for 250ms after last resize event
            });

            window.addEventListener('load', () => {
                setTimeout(checkHeatmapAlignment, 500);
            });
            
            // Also set up a resize check on window load for initial sizing
            window.addEventListener('load', () => {
                // Force resize once everything is loaded
                setTimeout(() => {
                    debug('📏 Initial layout, forcing resize');
                    window.dispatchEvent(new Event('resize'));
                    
                    // Additional resize after a bit to ensure proper layout
                    setTimeout(() => {
                        window.dispatchEvent(new Event('resize'));
                    }, 500);
                }, 200);
            });
        }
    </script>
</body>
