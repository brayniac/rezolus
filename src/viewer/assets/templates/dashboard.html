<!DOCTYPE html>
<html>
<head>
    <title>Rezolus Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.32/dist/uPlot.iife.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.32/dist/uPlot.min.css">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container full-width">
        <h1>Rezolus Time Series Dashboard</h1>
        
        <div class="instructions">
            <p>Click and drag on any chart to zoom all charts. Double-click to reset zoom.</p>
        </div>

        <button id="reset-zoom">Reset Zoom</button>
        <button id="toggle-all-groups">Expand/Collapse All Groups</button>

        <div id="dashboard-groups">
            <!-- Groups will be generated by JavaScript -->
        </div>
    </div>

    <script src="/static/zoom-controller.js"></script>
    <script>
        // Dashboard initialization
        document.addEventListener('DOMContentLoaded', () => {
            debug('🚀 Initializing dashboard');
            
            // Create zoom controller
            const zoomController = new ZoomController();
            
            // Get the groups container
            const groupsContainer = document.getElementById('dashboard-groups');
            
            // Group data from server
            const groupData = [];
            
            {% for group in metric_groups %}
            groupData.push({
                name: "{{ group.name }}",
                description: "{{ group.description }}",
                index: {{ loop.index0 }},
                series: [
                    {% for series in group.series %}
                    {
                        title: "{{ series.title | safe }}",
                        timestamps: {{ series.timestamps | json_encode | safe }},
                        yUnits: "{{ series.y_units | safe }}",
                        series: [
                            {% for s in series.series %}
                            {
                                name: "{{ s.name | safe }}",
                                values: {{ s.values | json_encode | safe }},
                                color: "{{ s.color | safe }}"
                            }{% if not loop.last %},{% endif %}
                            {% endfor %}
                        ]
                    }{% if not loop.last %},{% endif %}
                    {% endfor %}
                ]
            });
            {% endfor %}
            
            // Create all group HTML elements
            groupData.forEach((group, groupIdx) => {
                const groupElement = document.createElement('div');
                groupElement.className = 'metric-group';
                groupElement.id = `group-${groupIdx + 1}`;
                groupElement.setAttribute('data-group-name', group.name);
                
                // Create group header
                const headerElement = document.createElement('div');
                headerElement.className = 'group-header';
                
                const headerInfoElement = document.createElement('div');
                
                const nameElement = document.createElement('h2');
                nameElement.className = 'group-name';
                nameElement.textContent = group.name;
                
                const descElement = document.createElement('p');
                descElement.className = 'group-description';
                descElement.textContent = group.description;
                
                headerInfoElement.appendChild(nameElement);
                headerInfoElement.appendChild(descElement);
                
                const toggleButton = document.createElement('button');
                toggleButton.className = 'group-toggle';
                toggleButton.setAttribute('data-group', groupIdx + 1);
                
                headerElement.appendChild(headerInfoElement);
                headerElement.appendChild(toggleButton);
                
                // Create group content
                const contentElement = document.createElement('div');
                contentElement.className = 'group-content';
                
                // Add plots to group
                group.series.forEach((series, seriesIdx) => {
                    const plotContainer = document.createElement('div');
                    plotContainer.className = 'plot-container';
                    
                    const plotElement = document.createElement('div');
                    plotElement.id = `plot-${groupIdx}-${seriesIdx}`;
                    
                    plotContainer.appendChild(plotElement);
                    contentElement.appendChild(plotContainer);
                });
                
                // Assemble group
                groupElement.appendChild(headerElement);
                groupElement.appendChild(contentElement);
                
                // Add to page
                groupsContainer.appendChild(groupElement);
            });
            
            // Setup group toggle functionality
            setupGroupToggles();
            
            // Create all plots
            groupData.forEach((group, groupIdx) => {
                debug(`📊 Creating plots for group: ${group.name}`);
                
                // Replace the plot creation section in your dashboard.html with this code
                group.series.forEach((seriesData, seriesIdx) => {
                    const plotId = `plot-${groupIdx}-${seriesIdx}`;
                    const plotElement = document.getElementById(plotId);
                    
                    if (!plotElement) {
                        debug(`❌ Cannot find element with ID: ${plotId}`);
                        return;
                    }
                    
                    const container = plotElement.parentElement;
                    const containerWidth = container.clientWidth;
                    
                    debug(`📊 Plot ${plotId} data range: ${seriesData.timestamps[0].toFixed(2)} to ${seriesData.timestamps[seriesData.timestamps.length - 1].toFixed(2)}`);
                    debug(`📅 Plot ${plotId} time range: ${formatTimeOnly(seriesData.timestamps[0])} to ${formatTimeOnly(seriesData.timestamps[seriesData.timestamps.length - 1])}`);
                    debug(`🔤 Plot ${plotId} title: "${seriesData.title}", units: "${seriesData.yUnits}"`);
                    debug(`📐 Plot ${plotId} container width: ${containerWidth}px`);
                    
                    // Create tooltip plugin
                    const tooltipPlugin = createTooltipPlugin();
                    
                    // Create series options
                    const seriesOptions = createSeriesOptions(seriesData.series);
                    
                    // Create data array
                    const data = createDataArray(seriesData.timestamps, seriesData.series);
                    
                    // Create static legend plugin
                    const staticLegend = createStaticLegendPlugin(seriesData.series);
                    
                    const opts = {
                        width: containerWidth,
                        height: 350,
                        gutters: {
                            y: 15,
                            x: 8
                        },
                        scales: {
                            x: {
                                time: false
                            }
                        },
                        title: seriesData.title,
                        
                        background: '#1E1E1E',
                        
                        plugins: [
                            tooltipPlugin,
                            staticLegend
                        ],
                        
                        select: {
                            show: true,
                            stroke: 'rgba(86, 156, 214, 0.5)',
                            fill: 'rgba(86, 156, 214, 0.2)',
                        },
                        
                        hooks: {
                            setSelect: [],
                        },
                        
                        series: seriesOptions,
                        
                        axes: [
                            {
                                stroke: '#888888',
                                grid: {
                                    stroke: 'rgba(136, 136, 136, 0.1)',
                                },
                                values: (u, vals) => vals.map(v => formatTimeOnly(v))
                            },
                            {
                                label: seriesData.yUnits ? seriesData.yUnits : '',
                                stroke: '#888888',
                                grid: {
                                    stroke: 'rgba(136, 136, 136, 0.1)',
                                },
                            }
                        ],
                        
                        cursor: {
                            focus: {
                                prox: 16,
                            },
                            points: {
                                size: 6,
                                width: 2,
                                fill: "#1E1E1E",
                            },
                            lock: false,
                            sync: {
                                key: group.name, // Sync cursors within the same group
                                scales: ['x']
                            }
                        },
                        
                        legend: {
                            show: false  // We'll use our custom static legend instead
                        }
                    };
                    
                    try {
                        debug(`🔨 Creating plot ${plotId}: ${seriesData.title}`);
                        const plot = new uPlot(opts, data, document.getElementById(plotId));
                        
                        // Register plot with zoom controller
                        plot._id = plotId;
                        plot._group = groupIdx;
                        zoomController.registerPlot(plot);
                    } catch (err) {
                        debug(`❌ Error creating plot ${plotId}: ${err.message}`);
                        console.error(err);
                    }
                });
            });
            
            // Set the initial range flag after all plots are created
            zoomController.setInitialized();
            
            // Reset zoom button
            document.getElementById('reset-zoom').addEventListener('click', () => {
                debug(`👆 Reset button clicked`);
                zoomController.resetZoom();
            });
            
            // Make plots responsive with optimized resize handler
            window.addEventListener('resize', () => {
                // Use requestAnimationFrame to avoid too many resize calls
                if (window.resizeTimeout) {
                    cancelAnimationFrame(window.resizeTimeout);
                }
                
                window.resizeTimeout = requestAnimationFrame(() => {
                    zoomController.handleResize();
                });
            });
            
            // When all plots have been created, force a resize
            window.addEventListener('load', () => {
                // Force resize once everything is loaded
                setTimeout(() => {
                    window.dispatchEvent(new Event('resize'));
                    
                    debug('📏 Forced resize on load');
                    
                    // Additional resize after a bit to ensure proper layout
                    setTimeout(() => {
                        window.dispatchEvent(new Event('resize'));
                    }, 500);
                }, 200);
            });
            
            debug('✅ Dashboard initialization complete');
        });
        
        // Setup group toggle functionality
        function setupGroupToggles() {
            const toggleButtons = document.querySelectorAll('.group-toggle');
            
            toggleButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const groupId = button.getAttribute('data-group');
                    const groupElement = document.getElementById(`group-${groupId}`);
                    
                    groupElement.classList.toggle('collapsed');
                    
                    // Resize plots in group after toggling with a delay
                    setTimeout(() => {
                        if (!groupElement.classList.contains('collapsed')) {
                            const groupIndex = groupId - 1; // Convert to 0-based index
                            resizePlotsInGroup(groupIndex);
                            
                            // Force resize after a slight delay to ensure proper layout
                            setTimeout(() => {
                                window.dispatchEvent(new Event('resize'));
                            }, 100);
                        }
                    }, 50);
                });
            });
            
            // Toggle all groups button
            document.getElementById('toggle-all-groups').addEventListener('click', () => {
                const groups = document.querySelectorAll('.metric-group');
                const allCollapsed = Array.from(groups).every(g => g.classList.contains('collapsed'));
                
                groups.forEach(group => {
                    if (allCollapsed) {
                        group.classList.remove('collapsed');
                    } else {
                        group.classList.add('collapsed');
                    }
                });
                
                // Resize plots in all groups after toggling
                if (allCollapsed) {
                    setTimeout(() => {
                        resizeAllPlots();
                        
                        // Force resize after a slight delay to ensure proper layout
                        setTimeout(() => {
                            window.dispatchEvent(new Event('resize'));
                        }, 100);
                    }, 50);
                }
            });
        }
        
        function resizePlotsInGroup(groupIndex) {
            const plots = Array.from(window.uPlotInstances || [])
                .filter(plot => plot._group === groupIndex);
                
            plots.forEach(plot => {
                const container = plot.root.parentElement;
                if (!container) return;
                
                const newWidth = container.clientWidth;
                if (Math.abs(plot.width - newWidth) > 5) {
                    plot.setSize({width: newWidth, height: plot.height});
                }
            });
        }
        
        function resizeAllPlots() {
            const plots = Array.from(window.uPlotInstances || []);
            
            plots.forEach(plot => {
                const container = plot.root.parentElement;
                if (!container) return;
                
                const newWidth = container.clientWidth;
                if (Math.abs(plot.width - newWidth) > 5) {
                    plot.setSize({width: newWidth, height: plot.height});
                }
            });
        }

        // Updated series creation for the uPlot options
        function createSeriesOptions(seriesArray) {
            // First series is always time
            const seriesOptions = [
                {
                    label: 'Time'
                }
            ];
            
            // Add each data series
            seriesArray.forEach(s => {
                seriesOptions.push({
                    label: s.name,
                    stroke: s.color,
                    width: 2,
                    fill: `rgba(${hexToRgb(s.color)}, 0.1)`,
                });
            });
            
            return seriesOptions;
        }

        // Create the data array for uPlot
        function createDataArray(timestamps, seriesArray) {
            // First series is timestamps
            const data = [timestamps];
            
            // Add each data series values
            seriesArray.forEach(s => {
                data.push(s.values);
            });
            
            return data;
        }
        
        // Utility functions
        function debug(message) {
            const timestamp = new Date().toISOString().substr(11, 12);
            const formattedMessage = `[${timestamp}] ${message}`;
            
            console.log(formattedMessage);
        }
        
        function formatTime(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleTimeString([], {
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit', 
                hour12: false
            });
        }

        // Time-only formatting for axis labels (HH:MM:SS)
        function formatTimeOnly(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleTimeString([], {
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit', 
                hour12: false
            });
        }

        
        
        // Convert hex color to rgb for opacity support
        function hexToRgb(hex) {
            // Remove # if present
            hex = hex.replace('#', '');
            
            // Parse the hex values
            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);
            
            return `${r}, ${g}, ${b}`;
        }

        // Add this function to format the date in YYYY-MM-DD HH:MM:SS format
        function formatDateTimeISO(timestamp) {
            const date = new Date(timestamp * 1000);
            
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }


        // Create a plugin for the static series legend
        function createStaticLegendPlugin(seriesArray) {
            let legendEl;
            
            function init(u, opts) {
                // Create legend container
                legendEl = document.createElement('div');
                legendEl.className = 'static-legend';
                
                // Add an item for each series
                seriesArray.forEach(series => {
                    const item = document.createElement('div');
                    item.className = 'static-legend-item';
                    
                    const colorDot = document.createElement('span');
                    colorDot.className = 'static-legend-color';
                    colorDot.style.backgroundColor = series.color;
                    
                    const labelText = document.createElement('span');
                    labelText.textContent = series.name;
                    
                    item.appendChild(colorDot);
                    item.appendChild(labelText);
                    legendEl.appendChild(item);
                });
                
                // Add legend below the plot
                u.root.appendChild(legendEl);
            }
            
            return {
                hooks: {
                    init: init
                }
            };
        }

        // Create a custom tooltip with values in descending order
        function createTooltipPlugin() {
            let tooltipEl;
            
            function init(u, opts) {
                // Create tooltip element if it doesn't exist
                tooltipEl = document.createElement('div');
                tooltipEl.className = 'u-tooltip';
                
                u.over.appendChild(tooltipEl);
            }
            
            function update(u) {
                if (!u.cursor.idx) {
                    tooltipEl.style.display = 'none';
                    return;
                }
                
                // Get timestamp at cursor position
                const timestamp = u.data[0][u.cursor.idx];
                const formattedDate = formatDateTimeISO(timestamp);
                
                // Collect all series values
                const seriesValues = [];
                for (let i = 1; i < u.series.length; i++) {
                    const series = u.series[i];
                    if (!series.show) continue;
                    
                    const value = u.data[i][u.cursor.idx];
                    
                    // Skip null or undefined values
                    if (value === null || value === undefined) continue;
                    
                    // Format the value with 4 decimal places for smaller numbers, 
                    // or regular formatting for larger numbers
                    const formattedValue = Math.abs(value) < 0.01 
                        ? value.toFixed(4) 
                        : value.toLocaleString(undefined, {
                            minimumFractionDigits: 2,
                            maximumFractionDigits: 2
                          });
                    
                    seriesValues.push({
                        name: series.label || `Series ${i}`,
                        value: formattedValue,
                        color: series.stroke,
                        rawValue: value
                    });
                }
                
                // Sort values in descending order
                seriesValues.sort((a, b) => b.rawValue - a.rawValue);
                
                // Create HTML content
                let html = `<div class="header">${formattedDate}</div>`;
                
                seriesValues.forEach(sv => {
                    html += `
                        <div class="value-row">
                            <span class="label">
                                <span class="color-dot" style="background-color: ${sv.color};"></span>
                                ${sv.name}:
                            </span>
                            <span class="value">${sv.value}</span>
                        </div>
                    `;
                });
                
                tooltipEl.innerHTML = html;
                tooltipEl.style.display = 'block';
                
                // Position the tooltip
                const rect = u.over.getBoundingClientRect();
                const cursorLeft = u.cursor.left;
                const cursorTop = u.cursor.top;
                
                let left = cursorLeft + 10;
                let top = cursorTop + 10;
                
                // Make sure tooltip stays within plot
                const tooltipRect = tooltipEl.getBoundingClientRect();
                if (left + tooltipRect.width > rect.width) {
                    left = cursorLeft - tooltipRect.width - 10;
                }
                
                if (top + tooltipRect.height > rect.height) {
                    top = cursorTop - tooltipRect.height - 10;
                }
                
                tooltipEl.style.left = left + 'px';
                tooltipEl.style.top = top + 'px';
            }
            
            return {
                hooks: {
                    init: init,
                    setCursor: update
                }
            };
        }
    </script>
</body>
</html>
